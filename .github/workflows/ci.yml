name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mynutri_test_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mynutri_test_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/mynutri_test_ci
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/mynutri_test_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Lint backend
        working-directory: backend
        run: ruff check .
      - name: Test backend
        working-directory: backend
        run: pytest
      - name: Verify migration head and model drift
        working-directory: backend
        run: |
          alembic heads
          alembic check
      - name: Verify production database preflight
        working-directory: backend
        env:
          ENVIRONMENT: production
          DEPLOYMENT_PRINCIPAL_ID: 00000000-0000-0000-0000-000000000001
          SINGLE_USER_TOKEN: ci-only-secret
        run: python -m app.db.preflight
      - name: Check migration SQL
        working-directory: backend
        run: alembic upgrade head --sql

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck
      - name: Audit production dependencies
        working-directory: frontend
        run: npm audit --omit=dev
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mynutri_e2e_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mynutri_e2e_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/mynutri_e2e_ci
      SINGLE_USER_TOKEN: dev-token
      CALENDAR_TIMEZONE: Asia/Riyadh
      SNAPSHOT_V2_WRITER_ENABLED: "true"
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_API_TOKEN: dev-token
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_API_URL: http://127.0.0.1:8000
      PLAYWRIGHT_API_TOKEN: dev-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Backend
        run: pip install -e "./backend[dev]"
      - name: Install Frontend and Chromium
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Upgrade disposable database
        working-directory: backend
        run: alembic upgrade head
      - name: Provision test Principal
        env:
          PGPASSWORD: postgres
        run: >-
          psql -h 127.0.0.1 -U postgres -d mynutri_e2e_ci -v ON_ERROR_STOP=1
          -c "INSERT INTO principal (id,status,created_at,updated_at) VALUES
          ('00000000-0000-0000-0000-000000000001','active',now(),now());"
      - name: Start application services
        run: |
          cd backend
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/mynutri-api.log 2>&1 &
          cd ../frontend
          npm run build
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/mynutri-web.log 2>&1 &
          for attempt in {1..60}; do
            curl --fail --silent http://127.0.0.1:8000/health >/dev/null &&
            curl --fail --silent http://127.0.0.1:3000/profile >/dev/null && exit 0
            sleep 2
          done
          cat /tmp/mynutri-api.log /tmp/mynutri-web.log
          exit 1
      - name: Run complete Playwright suite
        working-directory: frontend
        run: npm run test:e2e
