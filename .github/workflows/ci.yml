name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mynutri_test_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mynutri_test_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/mynutri_test_ci
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/mynutri_test_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Lint backend
        working-directory: backend
        run: ruff check .
      - name: Test backend
        working-directory: backend
        run: pytest
      - name: Verify migration head and model drift
        working-directory: backend
        run: |
          alembic heads
          alembic check
      - name: Verify production database preflight
        working-directory: backend
        env:
          ENVIRONMENT: production
          DEPLOYMENT_PRINCIPAL_ID: 00000000-0000-0000-0000-000000000001
          SINGLE_USER_TOKEN: ci-only-secret
        run: python -m app.db.preflight
      - name: Check migration SQL
        working-directory: backend
        run: alembic upgrade head --sql

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck
      - name: Audit production dependencies
        working-directory: frontend
        run: npm audit --omit=dev
      - name: Build frontend
        working-directory: frontend
        run: npm run build
